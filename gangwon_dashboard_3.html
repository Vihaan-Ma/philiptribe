<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빌립지파 신천지 자원봉사단 봉사활동 통합 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f4f0;--card:#fff;--primary:#DB3178;--primary-light:#E8629B;
  --primary-soft:#FBE0EC;--accent:#F4845F;--text:#1a1a2e;--muted:#6b7280;
  --border:#e5e7eb;--amber:#E9A826;--coral:#E05C3A;--blue:#3B6EA5;--purple:#6B5EA8;
}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);}

.header{background:linear-gradient(135deg,#9A1F57 0%,#DB3178 60%,#E8629B 100%);
  color:#fff;padding:32px 48px 24px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.header-eyebrow{font-size:11px;letter-spacing:2px;opacity:.65;margin-bottom:8px;text-transform:uppercase;}
.header-title{font-size:24px;font-weight:700;letter-spacing:-.5px;}
.header-sub{font-size:13px;opacity:.7;margin-top:6px;}
.header-badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.hbadge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:500;}

/* 지부 선택 바 */
.branch-bar{background:#9A1F57;padding:12px 48px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.branch-bar-label{font-size:12px;color:rgba(255,255,255,.6);margin-right:8px;}
.branch-chip{padding:7px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.06);color:rgba(255,255,255,.85);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.branch-chip:hover{background:rgba(255,255,255,.15);}
.branch-chip.active{background:#fff;color:#9A1F57;border-color:#fff;font-weight:700;}

.nav{background:#fff;border-bottom:1px solid var(--border);padding:0 48px;display:flex;gap:0;position:sticky;top:0;z-index:10;overflow-x:auto;}
.nav-btn{padding:16px 22px;font-size:13px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;}
.nav-btn.active{color:var(--primary);border-bottom-color:var(--primary);}
.nav-btn:hover{color:var(--primary);}
.nav-btn:disabled{color:#d1d5db;cursor:not-allowed;}

.content{padding:32px 48px;max-width:1280px;margin:0 auto;}
.section{display:none;}.section.active{display:block;}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px;}
.kpi-card{background:#fff;border-radius:14px;padding:22px 24px;border:1px solid var(--border);position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary);}
.kpi-card.amber::before{background:var(--amber);}
.kpi-card.coral::before{background:var(--coral);}
.kpi-card.blue::before{background:var(--blue);}
.kpi-card.purple::before{background:var(--purple);}
.kpi-label{font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;}
.kpi-value{font-size:32px;font-weight:700;color:var(--primary);line-height:1;}
.kpi-card.amber .kpi-value{color:var(--amber);}
.kpi-card.coral .kpi-value{color:var(--coral);}
.kpi-card.blue .kpi-value{color:var(--blue);}
.kpi-card.purple .kpi-value{color:var(--purple);}
.kpi-unit{font-size:14px;font-weight:400;color:var(--muted);margin-left:3px;}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:6px;}

.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(480px,1fr));gap:20px;margin-bottom:24px;}
.chart-card{background:#fff;border-radius:14px;padding:26px;border:1px solid var(--border);}
.chart-card.full{grid-column:1/-1;}
.chart-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;}
.chart-desc{font-size:12px;color:var(--muted);margin-bottom:20px;}
.chart-wrap{position:relative;height:260px;}
.chart-wrap.tall{height:340px;}

.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.filter-label{font-size:13px;color:var(--muted);}
.filter-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .2s;}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

.insight-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;margin-bottom:24px;}
.insight-card{background:#fff;border-radius:14px;padding:24px;border:1px solid var(--border);border-left:4px solid var(--primary);}
.insight-card.amber{border-left-color:var(--amber);}
.insight-card.coral{border-left-color:var(--coral);}
.insight-card.blue{border-left-color:var(--blue);}
.insight-tag{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--primary);margin-bottom:8px;}
.insight-card.amber .insight-tag{color:#9a6c0f;}
.insight-card.coral .insight-tag{color:#a33d22;}
.insight-card.blue .insight-tag{color:var(--blue);}
.insight-title{font-size:15px;font-weight:600;margin-bottom:8px;}
.insight-body{font-size:13px;color:var(--muted);line-height:1.75;}
.insight-body strong{color:var(--text);}

.act-table{width:100%;border-collapse:collapse;font-size:13px;}
.act-table th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.3px;border-bottom:1px solid var(--border);}
.act-table td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.act-table tr:last-child td{border-bottom:none;}
.act-bar-wrap{display:flex;align-items:center;gap:10px;}
.act-bar{height:8px;border-radius:4px;background:var(--primary-soft);flex:1;max-width:160px;}
.act-bar-fill{height:100%;border-radius:4px;background:var(--primary);}

.reaction-section{margin-bottom:36px;}
.section-heading{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;}
.section-subheading{font-size:13px;color:var(--muted);margin-bottom:20px;}
.top10-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;margin-bottom:16px;}
.quote-card{background:#fff;border-radius:14px;padding:24px;border:1px solid var(--border);position:relative;}
.quote-card::before{content:'"';position:absolute;top:12px;left:20px;font-size:56px;color:var(--primary-soft);font-family:Georgia,serif;line-height:1;}
.quote-num{display:inline-block;width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:700;text-align:center;line-height:24px;margin-bottom:14px;}
.quote-text{font-size:14px;line-height:1.8;color:var(--text);margin-bottom:14px;padding-top:8px;font-style:italic;}
.quote-text em{font-style:normal;font-weight:700;color:var(--primary);}
.quote-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.quote-date{font-size:11px;color:var(--muted);}
.quote-act{font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;background:var(--primary-soft);color:var(--primary);}
.act-reaction-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;}
.act-reaction-card{background:#fff;border-radius:14px;padding:22px;border:1px solid var(--border);}
.act-reaction-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.act-icon{width:36px;height:36px;border-radius:10px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:18px;}
.act-reaction-title{font-size:14px;font-weight:600;}
.act-reaction-count{font-size:12px;color:var(--muted);}
.mini-quote{font-size:13px;line-height:1.7;color:var(--muted);margin-bottom:12px;padding:12px;background:#f9fafb;border-radius:8px;border-left:3px solid var(--primary-soft);}
.mini-quote:last-child{margin-bottom:0;}
.mini-quote-date{font-size:11px;color:var(--muted);margin-top:6px;}

.awareness-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
.highlight-box{background:linear-gradient(135deg,#9A1F57,#DB3178);color:#fff;border-radius:14px;padding:28px;margin-bottom:24px;}
.highlight-title{font-size:16px;font-weight:700;margin-bottom:6px;}
.highlight-sub{font-size:13px;opacity:.75;margin-bottom:20px;}
.highlight-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
.h-stat{text-align:center;}
.h-stat-val{font-size:28px;font-weight:700;}
.h-stat-label{font-size:11px;opacity:.7;margin-top:4px;}
.highlight-quote{background:rgba(255,255,255,.12);border-radius:10px;padding:18px;font-size:14px;line-height:1.75;font-style:italic;}
.highlight-quote em{font-style:normal;font-weight:700;}

.empty-state{background:#fff;border-radius:14px;padding:60px 24px;text-align:center;border:1px solid var(--border);}
.empty-state-icon{font-size:40px;margin-bottom:12px;}
.empty-state-title{font-size:15px;font-weight:600;margin-bottom:6px;}
.empty-state-desc{font-size:13px;color:var(--muted);}

/* 지부 시작년도 노트 */
.period-note{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:14px 18px;
  font-size:12px;color:#92400e;margin-bottom:20px;display:flex;align-items:center;gap:8px;}

/* 랭킹 테이블 */
.rank-table{width:100%;border-collapse:collapse;font-size:13px;}
.rank-table th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.3px;border-bottom:1px solid var(--border);}
.rank-table td{padding:11px 14px;border-bottom:1px solid var(--border);}
.rank-table tr:last-child td{border-bottom:none;}
.rank-badge{display:inline-flex;width:22px;height:22px;border-radius:50%;background:var(--primary-soft);color:var(--primary);
  align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.rank-badge.gold{background:#FEF3C7;color:#B45309;}
.rank-badge.silver{background:#F3F4F6;color:#6B7280;}
.rank-badge.bronze{background:#FFEDD5;color:#C2410C;}

@media(max-width:768px){
  .header{padding:24px;}.content{padding:20px;}.nav{padding:0 16px;}.branch-bar{padding:10px 16px;}
  .chart-grid{grid-template-columns:1fr;}.awareness-grid{grid-template-columns:1fr;}
  .nav-btn{padding:12px 14px;font-size:12px;}.top10-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-eyebrow">빌립지파 신천지 자원봉사단</div>
    <div class="header-title" id="mainTitle">빌립지파 신천지 자원봉사단 봉사활동 통합 대시보드</div>
    <div class="header-sub" id="mainSub">10개 지부 종합 · 2021~2026 봉사 기록 분석</div>
  </div>
  <div class="header-badges" id="headerBadges"></div>
</div>

<div class="branch-bar">
  <span class="branch-bar-label">지부 선택</span>
  <div class="branch-chip active" data-branch="__union__" onclick="selectBranch('__union__',this)">신천지 자원봉사단 종합</div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showTab('overview',this)">전체 현황</button>
  <button class="nav-btn" onclick="showTab('monthly',this)">기간별 분석</button>
  <button class="nav-btn" onclick="showTab('activity',this)">활동별 분석</button>
  <button class="nav-btn" id="reactionTabBtn" onclick="showTab('reaction',this)">현장 반응</button>
  <button class="nav-btn" onclick="showTab('insight',this)">인사이트</button>
</div>

<div class="content">

<!-- ═══ 전체 현황 ═══ -->
<div class="section active" id="sec-overview">
  <div id="periodNote"></div>
  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="chart-grid" id="overviewCharts"></div>
</div>

<!-- ═══ 기간별 분석 ═══ -->
<div class="section" id="sec-monthly">
  <div class="filter-row" id="yearFilterRow"></div>
  <div class="chart-grid">
    <div class="chart-card full"><div class="chart-title">월별 봉사 횟수</div><div class="chart-desc">월별 봉사 활동 건수 추이</div><div class="chart-wrap tall"><canvas id="monthlyCountChart"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">월별 봉사 인원</div><div class="chart-desc">월별 참여 봉사자 수</div><div class="chart-wrap"><canvas id="monthlyPeopleChart"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">월별 수혜자 수</div><div class="chart-desc">봉사 혜택을 받은 인원</div><div class="chart-wrap"><canvas id="monthlyBenefitChart"></canvas></div></div>
  </div>
</div>

<!-- ═══ 활동별 분석 ═══ -->
<div class="section" id="sec-activity">
  <div class="chart-card" style="margin-bottom:20px;">
    <div class="chart-title" id="actTableTitle">프로그램별 상세 현황</div>
    <div class="chart-desc" id="actTableDesc">활동 횟수 · 봉사 인원 · 비율 비교</div>
    <table class="act-table"><thead><tr><th id="actTableCol1">프로그램</th><th>봉사 횟수</th><th>비율</th><th id="actTableCol2">봉사 인원</th><th id="actTableCol3">평균/회</th></tr></thead>
    <tbody id="actTableBody"></tbody></table>
  </div>
  <div class="chart-grid">
    <div class="chart-card full"><div class="chart-title" id="actBarTitle">프로그램별 비교</div><div class="chart-desc">전체 기간 누적 기준</div><div class="chart-wrap tall"><canvas id="actBarChart"></canvas></div></div>
  </div>
</div>

<!-- ═══ 현장 반응 ═══ -->
<div class="section" id="sec-reaction">
  <div id="reactionContent"></div>
</div>

<!-- ═══ 인사이트 ═══ -->
<div class="section" id="sec-insight">
  <div class="insight-grid" id="insightGrid"></div>
  <div class="chart-card" id="insightRadarCard">
    <div class="chart-title">연도별 종합 성과 비교</div>
    <div class="chart-desc">봉사 횟수 · 인원 · 수혜자 3개 지표 레이더 차트</div>
    <div class="chart-wrap" style="height:320px;"><canvas id="radarChart"></canvas></div>
  </div>
</div>

</div><!-- /content -->

function selectBranch(branch,btn){
  currentBranch=branch;currentYearFilter='all';
  document.querySelectorAll('.branch-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('reactionTabBtn').textContent = '현장 반응';
  renderAll();
}

// 칩 초기화
const branchBar=document.querySelector('.branch-bar');
BRANCH_NAMES.forEach(b=>{
  const chip=document.createElement('div');
  chip.className='branch-chip';chip.dataset.branch=b;chip.textContent=b;
  chip.onclick=()=>selectBranch(b,chip);
  branchBar.appendChild(chip);
});

// ── 탭 전환 ──────────────────────────────────
function showTab(tab,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  btn.classList.add('active');
}

function renderMonthly(){
  const monthly = currentBranch==='__union__' ? buildUnionMonthly() : getBranchMonthly(currentBranch);
  const allYears=[...new Set(Object.keys(monthly).map(k=>k.slice(0,4)))].sort();

  const row=document.getElementById('yearFilterRow');
  row.innerHTML=`<span class="filter-label">연도 선택:</span>` +
    `<button class="filter-btn ${currentYearFilter==='all'?'active':''}" onclick="setYearFilter('all')">전체</button>` +
    allYears.map(y=>`<button class="filter-btn ${currentYearFilter===y?'active':''}" onclick="setYearFilter('${y}')">${y}${y==='2026'?' 상반기':''}</button>`).join('');

  const ks=Object.keys(monthly).filter(k=>currentYearFilter==='all'||k.startsWith(currentYearFilter)).sort();
  const sc={x:{grid:{display:false},ticks:{color:tck,maxRotation:45,font:{size:11}}},y:{grid:{color:grd},ticks:{color:tck}}};

  if(chartRefs.mCC)chartRefs.mCC.destroy();
  if(chartRefs.mPC)chartRefs.mPC.destroy();
  if(chartRefs.mBC)chartRefs.mBC.destroy();

  chartRefs.mCC=new Chart(document.getElementById('monthlyCountChart'),{type:'line',data:{labels:ks,datasets:[{label:'봉사 횟수',data:ks.map(k=>monthly[k].횟수),borderColor:'#DB3178',backgroundColor:'#DB317822',fill:true,tension:0.3,pointRadius:4,pointBackgroundColor:'#DB3178'}]},options:{...base,scales:sc}});
  chartRefs.mPC=new Chart(document.getElementById('monthlyPeopleChart'),{type:'bar',data:{labels:ks,datasets:[{label:'봉사 인원',data:ks.map(k=>monthly[k].인원),backgroundColor:'#E8629B',borderRadius:4}]},options:{...base,scales:sc}});
  chartRefs.mBC=new Chart(document.getElementById('monthlyBenefitChart'),{type:'bar',data:{labels:ks,datasets:[{label:'수혜자 수',data:ks.map(k=>monthly[k].수혜자),backgroundColor:'#F4845F',borderRadius:4}]},options:{...base,scales:sc}});
}
function setYearFilter(y){currentYearFilter=y;renderMonthly();}
function buildUnionMonthly(){
  const out={};
  BRANCH_NAMES.forEach(b=>{
    const m=getBranchMonthly(b);
    Object.entries(m).forEach(([k,v])=>{
      if(!out[k])out[k]={횟수:0,인원:0,수혜자:0};
      out[k].횟수+=v.횟수;out[k].인원+=v.인원;out[k].수혜자+=v.수혜자;
    });
  });
  return out;
}

// ════════════════════════════════════════════
function renderActivity(){
  const tb=document.getElementById('actTableBody');
  tb.innerHTML='';
  let actCount,actPeople,title,desc;

  if(currentBranch==='__union__'){
    actCount={};actPeople={};
    BRANCH_NAMES.forEach(b=>{
      Object.entries(DATA.branches[b].act_count).forEach(([k,v])=>actCount[k]=(actCount[k]||0)+v);
      Object.entries(DATA.branches[b].act_people).forEach(([k,v])=>actPeople[k]=(actPeople[k]||0)+v);
    });
    title='빌립지파 신천지 자원봉사단 프로그램별 상세 현황';
    desc='10개 지부 누적 · 핵심 5개 프로그램 + 기타/특별봉사';
  }else{
    actCount=DATA.branches[currentBranch].act_count;
    actPeople=DATA.branches[currentBranch].act_people;
    title=`${currentBranch} 프로그램별 상세 현황`;
    desc='활동 횟수 · 봉사 인원 · 비율 비교';
  }
  document.getElementById('actTableTitle').textContent=title;
  document.getElementById('actTableDesc').textContent=desc;
  document.getElementById('actBarTitle').textContent=title.replace('상세 현황','횟수 비교');

  const tot=Object.values(actCount).reduce((a,b)=>a+b,0);
  const aLabels=Object.keys(actCount).sort((a,b)=>actCount[b]-actCount[a]);

  aLabels.forEach(n=>{
    const c=actCount[n],pct=Math.round(c/tot*100),pp=actPeople[n]||0,avg=c>0&&pp>0?Math.round(pp/c):'-';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td style="font-weight:600">${n}</td><td>${c}회</td><td><div class="act-bar-wrap"><div class="act-bar"><div class="act-bar-fill" style="width:${pct}%"></div></div><span style="font-size:12px;color:#6b7280">${pct}%</span></div></td><td>${pp>0?pp.toLocaleString()+'명':'-'}</td><td>${avg!=='-'?avg+'명':'-'}</td>`;
    tb.appendChild(tr);
  });

  if(chartRefs.actBar)chartRefs.actBar.destroy();
  chartRefs.actBar=new Chart(document.getElementById('actBarChart'),{type:'bar',data:{labels:aLabels,datasets:[{label:'봉사 횟수',data:aLabels.map(a=>actCount[a]),backgroundColor:COLORS,borderRadius:6}]},
  options:{...base,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid:{color:grd},ticks:{color:tck}},y:{grid:{display:false},ticks:{color:tck}}}}});
}

function renderInsight(){
  const grid=document.getElementById('insightGrid');
  grid.innerHTML='';

  if(currentBranch==='__union__'){
    const c25=DATA.comparison_2025, c26=DATA.comparison_2026h1;
    const top25=BRANCH_NAMES.slice().sort((a,b)=>c25[b].수혜자-c25[a].수혜자);
    const top26=BRANCH_NAMES.slice().sort((a,b)=>c26[b].수혜자-c26[a].수혜자);
    const totalPos = Object.values(YEARLY_SENT).reduce((a,s)=>a+s.긍정,0);
    const totalAll = Object.values(YEARLY_SENT).reduce((a,s)=>a+s.긍정+s.중립+s.부정,0);

    grid.innerHTML=`
      <div class="insight-card"><div class="insight-tag">✦ 2025년 종합 1위</div><div class="insight-title">${top25[0]} — 수혜자 ${fmt(c25[top25[0]].수혜자)}명</div><div class="insight-body">2025년 한 해 동안 가장 많은 수혜자에게 도달한 지부입니다. 봉사 횟수 ${c25[top25[0]].횟수}회, 참여 인원 ${fmt(c25[top25[0]].인원)}명을 기록했습니다.</div></div>
      <div class="insight-card amber"><div class="insight-tag">⚠ 2026 상반기 1위</div><div class="insight-title">${top26[0]} — 수혜자 ${fmt(c26[top26[0]].수혜자)}명</div><div class="insight-body">2026년 1~5월 기준 최다 수혜자 지부입니다. ${top26[0]==top25[0]?'2025년에 이어 연속 1위를 유지하고 있습니다.':'2025년 1위였던 '+top25[0]+'과 순위가 바뀌었습니다.'}</div></div>
      <div class="insight-card"><div class="insight-tag">✦ 핵심 성과</div><div class="insight-title">10개 지부 누적 수혜자 ${fmt(DATA.union_total.beneficiaries)}명</div><div class="insight-body">전체 ${fmt(DATA.union_total.reports)}회 봉사로 누적 ${fmt(DATA.union_total.people)}명이 참여, 지역사회 ${fmt(DATA.union_total.beneficiaries)}명에게 직접적인 혜택을 전달했습니다.</div></div>

    const top5=top25.slice(0,5);
    const mxC=Math.max(...top5.map(b=>c25[b].횟수)),mxP=Math.max(...top5.map(b=>c25[b].인원)),mxB=Math.max(...top5.map(b=>c25[b].수혜자));
    chartRefs.radar=new Chart(document.getElementById('radarChart'),{type:'radar',data:{labels:['봉사 횟수','봉사 인원','수혜자 수'],

    options:{...base,scales:{r:{min:0,max:100,ticks:{display:false},grid:{color:grd},pointLabels:{color:'#374151',font:{size:13}}}}}});

  }else{
    const b=currentBranch;
    const yearly=getBranchYearly(b);
    const yrs=Object.keys(yearly);
    const bestYear=yrs.reduce((a,c)=>yearly[c].수혜자>yearly[a].수혜자?c:a,yrs[0]);
    const busiestYear=yrs.reduce((a,c)=>yearly[c].횟수>yearly[a].횟수?c:a,yrs[0]);
    const actCount=DATA.branches[b].act_count;
    const topAct=Object.entries(actCount).sort((a,c)=>c[1]-a[1])[0];
    const totalAct=Object.values(actCount).reduce((a,c)=>a+c,0);
    const topPct=Math.round(topAct[1]/totalAct*100);
    const c25=DATA.comparison_2025[b], c26=DATA.comparison_2026h1[b];
    const monthlyVals=Object.values(getBranchMonthly(b));
    const peopleRate=Math.round(monthlyVals.filter(m=>m.인원>0).length/monthlyVals.length*100);

    grid.innerHTML=`
      <div class="insight-card"><div class="insight-tag">✦ 최다 활동 연도</div><div class="insight-title">${busiestYear}년 — ${yearly[busiestYear].횟수}회</div><div class="insight-body">${b}의 연간 봉사 활동이 가장 활발했던 해입니다. 해당 연도 참여 인원 ${fmt(yearly[busiestYear].인원)}명, 수혜자 ${fmt(yearly[busiestYear].수혜자)}명을 기록했습니다.</div></div>
      <div class="insight-card amber"><div class="insight-tag">✦ 최대 수혜 연도</div><div class="insight-title">${bestYear}년 — 수혜자 ${fmt(yearly[bestYear].수혜자)}명</div><div class="insight-body">단일 연도 기준 가장 많은 지역 주민에게 혜택이 전달된 해입니다.</div></div>
      <div class="insight-card coral"><div class="insight-tag">● 핵심 프로그램</div><div class="insight-title">${topAct[0]} — 전체의 ${topPct}%</div><div class="insight-body">${b}에서 가장 많이 운영된 프로그램은 <strong>${topAct[0]}</strong>으로 총 ${topAct[1]}회(${topPct}%)를 차지합니다.</div></div>
      <div class="insight-card"><div class="insight-tag">→ 2025 vs 2026 상반기</div><div class="insight-title">2025년 ${c25.횟수}회 → 2026 상반기 ${c26.횟수}회</div><div class="insight-body">2025년 전체 수혜자 ${fmt(c25.수혜자)}명, 2026년 1~5월 수혜자 ${fmt(c26.수혜자)}명으로 ${c26.수혜자 >= c25.수혜자/2 ? '연간 추세를 상회하는' : '연간 추세 대비 다소 낮은'} 진행 속도를 보이고 있습니다.</div></div>
      <div class="insight-card blue"><div class="insight-tag">→ 데이터 품질</div><div class="insight-title">인원 기록률 ${peopleRate}%</div><div class="insight-body">전체 ${monthlyVals.length}개월 중 ${monthlyVals.filter(m=>m.인원>0).length}개월에 인원 수치가 기재되어 있습니다. 기록 표준화를 통해 분석 정확도를 높일 수 있습니다.</div></div>
      <div class="insight-card blue"><div class="insight-tag">→ 안내</div><div class="insight-title">현장 반응 분석은 준비 중</div><div class="insight-body">${b}의 시민 반응 감성분석 및 임팩트 TOP10은 원주교회 시범 분석 이후 순차 적용될 예정입니다.</div></div>`;

    document.getElementById('insightRadarCard').querySelector('.chart-title').textContent=`${b} 연도별 종합 성과 비교`;
    document.getElementById('insightRadarCard').querySelector('.chart-desc').textContent='봉사 횟수 · 인원 · 수혜자 3개 지표 레이더 차트';
    if(chartRefs.radar)chartRefs.radar.destroy();
    const mxC=Math.max(...yrs.map(y=>yearly[y].횟수))||1,mxP=Math.max(...yrs.map(y=>yearly[y].인원))||1,mxB=Math.max(...yrs.map(y=>yearly[y].수혜자))||1;
    chartRefs.radar=new Chart(document.getElementById('radarChart'),{type:'radar',data:{labels:['봉사 횟수','봉사 인원','수혜자 수'],
    datasets:yrs.map((y,i)=>({label:y+'년',data:[Math.round(yearly[y].횟수/mxC*100),Math.round(yearly[y].인원/mxP*100),Math.round(yearly[y].수혜자/mxB*100)],borderColor:COLORS[i],backgroundColor:COLORS[i]+'22',pointBackgroundColor:COLORS[i],borderWidth:2}))},
    options:{...base,scales:{r:{min:0,max:100,ticks:{display:false},grid:{color:grd},pointLabels:{color:'#374151',font:{size:13}}}}}});
  }
}

// 헤더 업데이트
// ════════════════════════════════════════════
function renderHeader(){
  const title=document.getElementById('mainTitle');
  const sub=document.getElementById('mainSub');
  const badges=document.getElementById('headerBadges');
  if(currentBranch==='__union__'){
    title.textContent='빌립지파 신천지 자원봉사단 봉사활동 통합 대시보드';
    sub.textContent='10개 지부 종합 · 2021~2026 봉사 기록 분석';
    const t=DATA.union_total;
    badges.innerHTML=`<div class="hbadge">총 ${fmt(t.reports)}회 봉사</div><div class="hbadge">봉사인원 ${fmt(t.people)}명</div><div class="hbadge">수혜자 ${fmt(t.beneficiaries)}명</div><div class="hbadge">10개 지부</div>`;
  }else{
    const b=currentBranch,t=DATA.branches[b].total,start=DATA.branches[b].start;
    title.textContent=`${b} 봉사활동 대시보드`;
    sub.textContent=`빌립지파 신천지 자원봉사단 · ${start} ~ 2026 활동 기록 분석`;
    badges.innerHTML=`<div class="hbadge">총 ${fmt(t.reports)}회 봉사</div><div class="hbadge">봉사인원 ${fmt(t.people)}명</div><div class="hbadge">수혜자 ${fmt(t.beneficiaries)}명</div>`;
  }
}

// ════════════════════════════════════════════
function renderAll(){
  destroyCharts();
  renderHeader();
  renderOverview();
  renderMonthly();
  renderActivity();
  renderReaction();
  renderInsight();
}
renderAll();
</script>
